name: Build & Deploy to AgentBase

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RUNTIME_NAME: csat-zalopay-agent
  IAM_TOKEN_URL: https://iam.api.vngcloud.vn/accounts-api/v2/auth/token
  AGENTBASE_CR_URL: https://agentbase.api.vngcloud.vn/cr/api/v1
  AGENTBASE_RUNTIME_URL: https://agentbase.api.vngcloud.vn/runtime

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get IAM Token
        id: iam
        run: |
          RAW=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "$IAM_TOKEN_URL" \
            -u "${{ secrets.GREENNODE_CLIENT_ID }}:${{ secrets.GREENNODE_CLIENT_SECRET }}" \
            -d "grant_type=client_credentials" \
            -H "Content-Type: application/x-www-form-urlencoded")
          HTTP_STATUS=$(echo "$RAW" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RAW" | sed '/HTTP_STATUS:/d')
          echo "IAM HTTP status: $HTTP_STATUS"
          # Show error code only (not token value)
          ERR=$(echo "$BODY" | jq -r '.errors[0].code // empty' 2>/dev/null)
          [ -n "$ERR" ] && echo "IAM error code: $ERR"
          TOKEN=$(echo "$BODY" | jq -r '.access_token // empty')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "ERROR: Failed to get IAM token (HTTP $HTTP_STATUS)"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "IAM token obtained successfully"

      - name: Get Container Registry info
        id: cr
        run: |
          RESP=$(curl -s -H "Authorization: Bearer ${{ steps.iam.outputs.token }}" \
            "$AGENTBASE_CR_URL/repository")
          REGISTRY_URL=$(echo "$RESP" | jq -r '.registryUrl')
          REPO_NAME=$(echo "$RESP" | jq -r '.name')
          if [ -z "$REGISTRY_URL" ] || [ "$REGISTRY_URL" = "null" ]; then
            echo "ERROR: Could not get CR info: $RESP"
            exit 1
          fi
          echo "registry_url=$REGISTRY_URL" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "CR: $REGISTRY_URL/$REPO_NAME"

      - name: Get CR credentials & Docker login
        run: |
          CREDS=$(curl -s -H "Authorization: Bearer ${{ steps.iam.outputs.token }}" \
            "$AGENTBASE_CR_URL/registry-credential")
          CR_USER=$(echo "$CREDS" | jq -r '.username')
          CR_PASS=$(echo "$CREDS" | jq -r '.password // .secret // .secretKey')
          echo "::add-mask::$CR_PASS"
          echo "$CR_PASS" | docker login "${{ steps.cr.outputs.registry_url }}" \
            --username "$CR_USER" --password-stdin
          echo "Docker login OK"

      - name: Build Docker image
        run: |
          IMAGE="${{ steps.cr.outputs.registry_url }}/${{ steps.cr.outputs.repo_name }}/${{ env.RUNTIME_NAME }}"
          TAG="v$(date +%Y%m%d%H%M%S)"
          docker build --platform linux/amd64 -t "$IMAGE:$TAG" -t "$IMAGE:latest" .
          echo "image=$IMAGE" >> $GITHUB_ENV
          echo "tag=$TAG" >> $GITHUB_ENV

      - name: Push Docker image
        run: |
          docker push "${{ env.image }}:${{ env.tag }}"
          docker push "${{ env.image }}:latest"
          echo "Pushed: ${{ env.image }}:${{ env.tag }}"

      - name: Get image auth for runtime
        id: imageauth
        run: |
          CREDS=$(curl -s -H "Authorization: Bearer ${{ steps.iam.outputs.token }}" \
            "$AGENTBASE_CR_URL/registry-credential")
          CR_USER=$(echo "$CREDS" | jq -r '.username')
          CR_PASS=$(echo "$CREDS" | jq -r '.password // .secret // .secretKey')
          echo "::add-mask::$CR_PASS"
          AUTH=$(echo -n "$CR_USER:$CR_PASS" | base64 -w0)
          echo "::add-mask::$AUTH"
          IMAGE_AUTH=$(jq -n \
            --arg reg "${{ steps.cr.outputs.registry_url }}" \
            --arg user "$CR_USER" \
            --arg auth "$AUTH" \
            '{"registryUrl":$reg,"username":$user,"auth":$auth}')
          echo "imageauth=$(echo $IMAGE_AUTH | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Check existing runtime
        id: runtime_check
        run: |
          RESP=$(curl -s -H "Authorization: Bearer ${{ steps.iam.outputs.token }}" \
            "$AGENTBASE_RUNTIME_URL/agent-runtimes?page=1&size=100")
          RUNTIME_ID=$(echo "$RESP" | jq -r \
            --arg name "${{ env.RUNTIME_NAME }}" \
            '.listData[]? | select(.name==$name) | .id' | head -1)
          echo "runtime_id=$RUNTIME_ID" >> $GITHUB_OUTPUT
          if [ -n "$RUNTIME_ID" ]; then
            echo "Found existing runtime: $RUNTIME_ID"
          else
            echo "No existing runtime — will create new"
          fi

      - name: Get compute flavor
        id: flavor
        run: |
          RESP=$(curl -s -H "Authorization: Bearer ${{ steps.iam.outputs.token }}" \
            "$AGENTBASE_RUNTIME_URL/flavors")
          FLAVOR=$(echo "$RESP" | jq -r \
            '.listData[]? | select(.supportedResourceTypes[]? == "agent-runtime") | .name' \
            | grep "1x1" | head -1)
          if [ -z "$FLAVOR" ]; then
            FLAVOR=$(echo "$RESP" | jq -r \
              '.listData[]? | select(.supportedResourceTypes[]? == "agent-runtime") | .name' \
              | head -1)
          fi
          echo "flavor=$FLAVOR" >> $GITHUB_OUTPUT
          echo "Using flavor: $FLAVOR"

      - name: Deploy or update runtime
        id: deploy
        run: |
          IMAGE_AUTH=$(echo "${{ steps.imageauth.outputs.imageauth }}" | base64 -d)
          FULL_IMAGE="${{ env.image }}:${{ env.tag }}"
          PAYLOAD=$(jq -n \
            --arg name "${{ env.RUNTIME_NAME }}" \
            --arg image "$FULL_IMAGE" \
            --arg flavor "${{ steps.flavor.outputs.flavor }}" \
            --argjson imageAuth "$IMAGE_AUTH" \
            '{
              "name": $name,
              "imageUrl": $image,
              "flavorName": $flavor,
              "minReplicas": 1,
              "maxReplicas": 1,
              "cpuScaleThreshold": 50,
              "memScaleThreshold": 50,
              "imageAuth": $imageAuth,
              "envVars": [
                {"name": "GREENNODE_API_KEY", "value": "${{ secrets.GREENNODE_API_KEY }}"}
              ]
            }')

          RUNTIME_ID="${{ steps.runtime_check.outputs.runtime_id }}"
          if [ -n "$RUNTIME_ID" ]; then
            echo "Updating runtime $RUNTIME_ID..."
            RESP=$(curl -s -X PATCH \
              -H "Authorization: Bearer ${{ steps.iam.outputs.token }}" \
              -H "Content-Type: application/json" \
              "$AGENTBASE_RUNTIME_URL/agent-runtimes/$RUNTIME_ID" \
              -d "$PAYLOAD")
          else
            echo "Creating new runtime..."
            RESP=$(curl -s -X POST \
              -H "Authorization: Bearer ${{ steps.iam.outputs.token }}" \
              -H "Content-Type: application/json" \
              "$AGENTBASE_RUNTIME_URL/agent-runtimes" \
              -d "$PAYLOAD")
          fi

          RUNTIME_ID=$(echo "$RESP" | jq -r '.id // .data.id // empty')
          if [ -z "$RUNTIME_ID" ]; then
            echo "ERROR deploying: $RESP"
            exit 1
          fi
          echo "runtime_id=$RUNTIME_ID" >> $GITHUB_OUTPUT
          echo "Deployed runtime: $RUNTIME_ID"

      - name: Wait for ACTIVE status
        id: wait
        run: |
          RUNTIME_ID="${{ steps.deploy.outputs.runtime_id }}"
          for i in $(seq 1 20); do
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ steps.iam.outputs.token }}" \
              "$AGENTBASE_RUNTIME_URL/agent-runtimes/$RUNTIME_ID" \
              | jq -r '.status // .data.status')
            echo "Attempt $i/20: status=$STATUS"
            if [ "$STATUS" = "ACTIVE" ]; then
              echo "status=ACTIVE" >> $GITHUB_OUTPUT
              break
            elif [ "$STATUS" = "ERROR" ] || [ "$STATUS" = "FAILED" ]; then
              echo "Runtime failed with status: $STATUS"
              exit 1
            fi
            sleep 15
          done

      - name: Get endpoint URL
        run: |
          RUNTIME_ID="${{ steps.deploy.outputs.runtime_id }}"
          ENDPOINTS=$(curl -s \
            -H "Authorization: Bearer ${{ steps.iam.outputs.token }}" \
            "$AGENTBASE_RUNTIME_URL/agent-runtimes/$RUNTIME_ID/endpoints")
          ENDPOINT_URL=$(echo "$ENDPOINTS" | jq -r \
            '.listData[]? | select(.name=="DEFAULT") | .url' | head -1)
          echo "Endpoint URL: $ENDPOINT_URL"
          curl -s -o /dev/null -w "Health check: %{http_code}\n" "$ENDPOINT_URL/health" || true
          echo ""
          echo "Deployment complete!"
          echo "  Runtime ID: $RUNTIME_ID"
          echo "  Endpoint:   $ENDPOINT_URL"
          echo "  Console:    https://aiplatform.console.vngcloud.vn/agent-runtime?tab=runtime"
